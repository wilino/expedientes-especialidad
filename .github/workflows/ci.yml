name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: SCA dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: expedientes
          MYSQL_PASSWORD: expedientes
          MYSQL_DATABASE: expedientes
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uexpedientes -pexpedientes --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql://expedientes:expedientes@localhost:3306/expedientes
      JWT_SECRET: ci-test-secret
      PORT: 4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Apply migrations
        run: npm -w apps/api exec prisma migrate deploy

      - name: Seed database
        run: npm -w apps/api run prisma:seed

      - name: Lint API
        run: npm -w apps/api run lint

      - name: Build API
        run: npm -w apps/api run build

      - name: Build Web
        run: npm -w apps/web run build

      - name: Test API
        run: npm -w apps/api run test

      - name: Test API e2e
        run: npm -w apps/api run test:e2e
