name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: expedientes
          POSTGRES_PASSWORD: expedientes
          POSTGRES_DB: expedientes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expedientes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://expedientes:expedientes@localhost:5432/expedientes
      JWT_SECRET: ci-test-secret
      PORT: 4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint API
        run: npm -w apps/api run lint

      - name: Build API
        run: npm -w apps/api run build

      - name: Build Web
        run: npm -w apps/web run build

      - name: Test API
        run: npm -w apps/api run test
