name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - service: web
            dockerfile: apps/web/Dockerfile
            build_args: |
              VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:4000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image names
        id: names
        shell: bash
        run: |
          echo "owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.names.outputs.owner }}/${{ steps.names.outputs.repo }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check deploy secrets
        env:
          HAS_HOST: ${{ secrets.DEPLOY_HOST }}
          HAS_USER: ${{ secrets.DEPLOY_USER }}
          HAS_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$HAS_HOST" ] || [ -z "$HAS_USER" ] || [ -z "$HAS_KEY" ]; then
            echo "::warning::Deploy secrets not configured — skipping deploy."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Configure SSH key
        if: env.SKIP_DEPLOY != 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add deploy host to known_hosts
        if: env.SKIP_DEPLOY != 'true'
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy command
        if: env.SKIP_DEPLOY != 'true'
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
        run: |
          COMMAND="$DEPLOY_COMMAND"
          if [ -z "$COMMAND" ]; then
            APP_DIR="${DEPLOY_APP_DIR:-~/expedientes-especialidad}"
            COMMAND="cd $APP_DIR && bash scripts/deploy/remote-deploy.sh"
          fi

          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "$COMMAND"
